<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click2Bite - Admin Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="admin-login" class="center-page">
  <main class="card login-card">
    <a class="brand centered-brand" href="index.html">
      <span class="brand-mark">C2B</span>
      <span>Click2Bite</span>
    </a>
    <h1>Admin Login</h1>
    <p class="muted">Demo credentials: <strong>admin</strong> / <strong>1234</strong></p>
    <form id="adminLoginForm" class="stack">
      <label>Username
        <input id="adminUsername" type="text" value="admin" required>
      </label>
      <label>Password
        <input id="adminPassword" type="password" value="1234" required>
      </label>
      <button class="btn btn-primary" type="submit">Login</button>
      <a class="text-link" href="homepage.html">Back to canteens</a>
    </form>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
