<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click2Bite - Canteens</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="home">
  <header class="site-header page-header">
    <nav class="nav container" aria-label="Main navigation">
      <a class="brand" href="homepage.html">
        <span class="brand-mark">C2B</span>
        <span>Click2Bite</span>
      </a>
      <div class="nav-links">
        <a href="homepage.html" aria-current="page">Canteens</a>
        <a href="orders.html">My Orders</a>
        <a href="vendor.html">Vendor</a>
        <a href="cashier.html">Cashier</a>
        <a href="admin-login.html">Admin</a>
      </div>
    </nav>
    <section class="container page-title-row">
      <div>
        <p class="eyebrow">Available around campus</p>
        <h1>Choose your canteen</h1>
        <p class="muted">Welcome, <strong id="studentName">Student</strong>. Select a stall to browse its menu and place your order.</p>
      </div>
      <img class="page-icon" src="assets/images/canteen.svg" alt="Canteen storefront illustration">
    </section>
  </header>

  <main class="container section">
    <div class="toolbar card">
      <label class="search-label">Search canteen or food
        <input id="canteenSearch" type="search" placeholder="Try burger, rice, coffee, JMJJ...">
      </label>
      <label class="checkbox-row">
        <input id="openOnly" type="checkbox" checked>
        Show open only
      </label>
    </div>

    <section id="canteenGrid" class="canteen-grid" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <p>&copy; 2026 Click2Bite</p>
      <div><a id="studentLogout" href="index.html#login-card">Logout</a></div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
