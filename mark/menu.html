<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click2Bite - Menu</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="menu">
  <header class="site-header page-header compact-header">
    <nav class="nav container" aria-label="Main navigation">
      <a class="brand" href="homepage.html">
        <span class="brand-mark">C2B</span>
        <span>Click2Bite</span>
      </a>
      <div class="nav-links">
        <a href="homepage.html">Back to Canteens</a>
        <a href="orders.html">My Orders</a>
      </div>
    </nav>
  </header>

  <main class="container section menu-layout">
    <section>
      <div class="section-heading inline-heading">
        <div>
          <p class="eyebrow">Menu</p>
          <h1 id="menuTitle">Canteen Menu</h1>
          <p id="menuSubtitle" class="muted">Choose your meals.</p>
        </div>
      </div>
      <div id="menuGrid" class="menu-grid" aria-live="polite"></div>
    </section>

    <aside class="card cart-panel" aria-label="Cart">
      <h2>Cart</h2>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cartTotal">PHP 0.00</strong>
      </div>
      <fieldset class="payment-box">
        <legend>Payment</legend>
        <label><input type="radio" name="paymentMethod" value="Cash" checked> Cash</label>
        <label><input type="radio" name="paymentMethod" value="GCash"> GCash</label>
      </fieldset>
      <label class="stack small-gap">Pickup note
        <textarea id="orderNote" rows="3" placeholder="Example: no cucumber, pickup 12:15 PM"></textarea>
      </label>
      <button id="placeOrderBtn" class="btn btn-primary full-width" type="button">Place Order</button>
      <p class="muted small-text">Orders and registered accounts are saved in this browser using localStorage.</p>
    </aside>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
